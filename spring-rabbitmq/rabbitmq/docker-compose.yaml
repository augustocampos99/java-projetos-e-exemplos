
version: '3'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672" # Standard AMQP port
      - "15672:15672" # Management plugin web UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/ # Persistence for data
      - rabbitmq_log:/var/log/rabbitmq/ # Persistence for logs

volumes:
  rabbitmq_data:
    driver: local
  rabbitmq_log:
    driver: local