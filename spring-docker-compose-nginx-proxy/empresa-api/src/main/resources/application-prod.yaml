spring:
  application:
    name: empresa-api

  datasource:
    url: ${DATASOURCE_URL}
    username:  ${DATASOURCE_USERNAME}
    password:  ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    testWhileIdle: true
    validationQuery: SELECT 1
    jpa:
      show-sql: false
      properties:
        hibernate:
          format_sql: false

  flyway:
    enabled=true:
    url: ${DATASOURCE_URL}
    user: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  server:
    port: 8080
    error:
      include-stacktrace: never


  web:
    error:
      include-stacktrace: never

