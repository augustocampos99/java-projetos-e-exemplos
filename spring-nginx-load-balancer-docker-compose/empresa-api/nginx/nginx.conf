# Esses são os servidores que vou expor e fazer a troca no meu balanceamento de carga
upstream servers {
    server app-1:8080;
    server app-2:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Retorna no header para identificar qual aplicação estou acessando no balanceamento
        add_header X-Backend-Server $upstream_addr; 
    }
}